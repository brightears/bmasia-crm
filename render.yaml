services:
  - type: web
    name: bmasia-crm
    env: python
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SOUNDTRACK_API_TOKEN
        sync: false
      - key: SOUNDTRACK_CLIENT_ID
        sync: false
      - key: SOUNDTRACK_CLIENT_SECRET
        sync: false

  # ALL email cron jobs DISABLED (30.03.2026)
  # Lyra handles all client communication: renewals, payments, quarterly check-ins, prospect outreach
  # Re-enable only if Lyra goes offline for extended period
  #
  # Previously:
  # - bmasia-crm-email-sender: daily 9am (renewal, payment, quarterly, zone-alerts)
  # - bmasia-crm-email-sequences: every 20min (prospect sequences)
